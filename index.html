<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Knowledge</title>
    <style>
        /* The Professional Design */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #b21f1f, #fdbb2d); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            width: 85%;
            max-width: 650px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 { font-size: 2.8rem; margin-bottom: 5px; letter-spacing: 3px; font-weight: 800; text-transform: uppercase; }
        p { margin-bottom: 35px; opacity: 0.9; }

        /* The Search Bar Box */
        .gcse-search-wrapper {
            background: #ffffff;
            border-radius: 12px;
            padding: 12px;
            min-height: 60px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SEARCH KNOWLEDGE</h1>
        <p>THE PROFESSIONAL RESEARCH PORTAL</p>
        
        <div class="gcse-search-wrapper">
            <script async src="https://cse.google.com/cse.js?cx=73a0c90b382a24a55"></script>
            <div class="gcse-search"></div>
        </div>
    </div>

</body>
</html>
