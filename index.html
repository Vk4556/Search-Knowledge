<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Knowledge | Safe Search</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        /* Colorful Logo style like Kiddle */
        .logo {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }
        .l1 { color: #4285F4; } /* Blue */
        .l2 { color: #EA4335; } /* Red */
        .l3 { color: #FBBC05; } /* Yellow */
        .l4 { color: #4285F4; } /* Blue */
        .l5 { color: #34A853; } /* Green */
        .l6 { color: #EA4335; } /* Red */

        .search-wrapper {
            width: 90%;
            max-width: 600px;
            margin-top: 10px;
        }

        .info-text {
            color: #70757a;
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="logo">
        <span class="l1">K</span><span class="l2">n</span><span class="l3">o</span><span class="l4">w</span><span class="l5">l</span><span class="l6">e</span>
    </div>

    <div class="search-wrapper">
        <script async src="https://cse.google.com/cse.js?cx=73a0c90b382a24a55"></script>
        
        <div class="gcse-search"></div>
    </div>

    <div class="info-text">
        Safe Search Engine for Students
    </div>

</body>
</html>
