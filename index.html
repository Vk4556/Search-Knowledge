<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Knowledge</title>
    <style>
        /* This is the CSS that makes it look good */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 80%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* Styling the Google Search box specifically */
        .gcse-search-wrapper {
            background: white;
            border-radius: 30px;
            padding: 5px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SEARCH KNOWLEDGE</h1>
        <p>The Professional Research Portal</p>
        
        <div class="gcse-search-wrapper">
            <script async src="https://cse.google.com/cse.js?cx=YOUR_ID_HERE"></script>
            <div class="gcse-search"></div>
            </div>
    </div>

</body>
</html>
